# CI that builds release binaries via cargo-dist.
# Triggered on push of v* tags (e.g. v0.1.0).
#
# Auto-generated-like workflow for cargo-dist v0.31.0
# https://opensource.axo.dev/cargo-dist/

name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build matrix: one job per target triple.
  build:
    name: Build – ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../owui-lint-${{ matrix.target }}.tar.gz owui-lint
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../owui-lint-${{ matrix.target }}.zip owui-lint.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: owui-lint-${{ matrix.target }}.*

  # Generate checksums and create GitHub Release.
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          sha256sum owui-lint-* > sha256-checksums.txt
          cat sha256-checksums.txt

      - name: Copy installer scripts
        run: |
          cp scripts/install.sh dist/owui-lint-installer.sh
          cp scripts/uninstall.sh dist/owui-lint-uninstaller.sh
          cp scripts/install.ps1 dist/owui-lint-installer.ps1
          cp scripts/uninstall.ps1 dist/owui-lint-uninstaller.ps1
          chmod +x dist/owui-lint-installer.sh dist/owui-lint-uninstaller.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/owui-lint-*.tar.gz
            dist/owui-lint-*.zip
            dist/sha256-checksums.txt
            dist/owui-lint-installer.sh
            dist/owui-lint-installer.ps1
            dist/owui-lint-uninstaller.sh
            dist/owui-lint-uninstaller.ps1
